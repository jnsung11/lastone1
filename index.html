<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍콩여행</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#fff; overflow:hidden; }
.stage {
position:absolute; top:50%; left:50%;
transform:translate(-50%,-50%);
width:1700px; height:952px;
transform-origin:center center;}
.layer { position:absolute; }
.layer img { width:100%; display:block; -webkit-user-drag:none; user-select:none; }
.dial {position:absolute; left:456px; top:76.2px; width:800px;
transform-origin:50% 50%;
cursor:grab; z-index:1; will-change:transform;
touch-action:none;}
.dial.grabbing { cursor:grabbing; }
.dial img { width:100%; display:block; pointer-events:none; -webkit-user-drag:none; user-select:none; }
.dial.returning { transition:transform .9s cubic-bezier(.34,1.4,.5,1); }
.center-logo { position:absolute; left:669.70px; top:290.11px; width:372.5px; z-index:2; pointer-events:none; }
.center-logo img { width:100%; display:block; }
.pin { position:absolute; left:1010px; top:720px; width:110px; z-index:3; pointer-events:none; }
.pin img { width:100%; display:block; }
</style>
</head>
<body>
<div class="stage">
<div class="layer arrow">
<img src="background.png" alt="배경">
</div>
<div class="layer dial">
<img src="dial.png" alt="다이얼">
</div>
<div class="center-logo">
<img src="middlelogo.png" alt="중앙 로고">
</div>
<div class="pin">
<img src="pin.png" alt="핀">
</div>
</div>
</div>

<script>
(function(){
const stage=document.querySelector('.stage');
const BW=1700,BH=952;
let scale=1;
function fit(){ scale=Math.min(innerWidth/BW,innerHeight/BH); stage.style.transform='translate(-50%,-50%) scale('+scale+')'; }
addEventListener('resize',fit); fit();

const dial=document.querySelector('.dial');
const TRIGGER=100, LIMIT=300;

let dragging=false, startA=0, rot=0, fired=false;

\function center(){
const r=dial.getBoundingClientRect();
return { cx:r.left+r.width/2, cy:r.top+r.height/2 };
}
function ang(e,c){
const x=(e.touches?e.touches[0].clientX:e.clientX)-c.cx;
const y=(e.touches?e.touches[0].clientY:e.clientY)-c.cy;
return Math.atan2(y,x)*180/Math.PI;
}

let c=null;
function down(e){
if(fired)return;
e.preventDefault();
dragging=true;
dial.classList.add('grabbing');
dial.classList.remove('returning');
c=center();
startA=ang(e,c)-rot;  \
}
function move(e){
if(!dragging||fired)return; e.preventDefault();
let d=ang(e,c)-startA;
\while(d-rot>180)d-=360;
while(d-rot<-180)d+=360;
if(d<0)d=0; if(d>LIMIT)d=LIMIT;
rot=d;
dial.style.transform='rotate('+rot+'deg)';
if(rot>=TRIGGER){
fired=true;
dragging=false;
dial.classList.remove('grabbing');
dial.classList.add('returning');
dial.style.transform='rotate(0deg)'; rot=0;
setTimeout(function(){ location.href='next.html'; },700);
}
}
function up(){
if(!dragging||fired)return;
dragging=false;
dial.classList.remove('grabbing');
dial.classList.add('returning');
dial.style.transform='rotate(0deg)'; rot=0;
}
addEventListener('mousedown',down);
addEventListener('mousemove',move);
addEventListener('mouseup',up);
addEventListener('touchstart',down,{passive:false});
addEventListener('touchmove',move,{passive:false});
addEventListener('touchend',up);
})();
</script>
